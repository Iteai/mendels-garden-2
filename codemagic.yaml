workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      node: 18
      npm: 9

    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper

    scripts:
      - name: Download missing assets
        script: |
          mkdir -p assets
          curl -L -o assets/icon.png "https://dummyimage.com/1024x1024/1a2e1a/81c784.png"
          curl -L -o assets/splash.png "https://dummyimage.com/1242x2436/1a2e1a/81c784.png"
          curl -L -o assets/adaptive-icon.png "https://dummyimage.com/1024x1024/1a2e1a/81c784.png"
          curl -L -o assets/favicon.png "https://dummyimage.com/192x192/1a2e1a/81c784.png"

      - name: Install dependencies
        script: |
          rm -rf node_modules
          rm -f package-lock.json
          npm cache clean --force
          npm install --legacy-peer-deps

      - name: Fix Expo dependencies
        script: |
          npx expo install --fix

      - name: Prebuild Android (clean)
        script: |
          export NODE_ENV=production
          rm -rf android
          npx expo prebuild --platform android --clean --non-interactive

      - name: Fix MainActivity for gesture handler
        script: |
          MAIN_ACTIVITY="android/app/src/main/java/com/plantgenetics/app/MainActivity.kt"
          if [ -f "$MAIN_ACTIVITY" ]; then
            if ! grep -q "RNGestureHandlerEnabledRootView" "$MAIN_ACTIVITY"; then
              # Aggiungi l'import DOPO la riga che inizia con "package"
              sed -i '/^package /a\import com.swmansion.gesturehandler.react.RNGestureHandlerEnabledRootView' "$MAIN_ACTIVITY"
            fi
          fi

      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build APK
        script: |
          export NODE_ENV=production
          cd android
          chmod +x ./gradlew
          ./gradlew clean
          ./gradlew assembleRelease -x lint

      - name: Build AAB
        script: |
          export NODE_ENV=production
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease -x lint

    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - developer@example.com
        notify:
          success: true
          failure: true
