workflows:
  android-workflow:
    name: Android APK build
    max_build_duration: 60

    environment:
      groups:
        - Expo
      node: 20.11.0
      vars:
        PACKAGE_NAME: com.plantgenetics.app
        EAS_NO_VCS: "1"
        EAS_LOCAL_BUILD_SKIP_CLEANUP: "1"
        EAS_BUILD_DISABLE_EXPO_DOCTOR_STEP: "1"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
        - pattern: main
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Set Node version
        script: nvm use 20 || true

      - name: Check Expo token
        script: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN non impostato"
            exit 1
          fi
          echo "EXPO_TOKEN presente"

      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Download missing assets
        script: |
          mkdir -p assets
          curl -L -o assets/icon.png "https://dummyimage.com/1024x1024/1a2e1a/81c784.png"
          curl -L -o assets/splash.png "https://dummyimage.com/1242x2436/1a2e1a/81c784.png"
          curl -L -o assets/adaptive-icon.png "https://dummyimage.com/1024x1024/1a2e1a/81c784.png"
          curl -L -o assets/favicon.png "https://dummyimage.com/192x192/1a2e1a/81c784.png"

      - name: Install EAS CLI
        script: npm install -g eas-cli@latest

      - name: Debug Expo config
        script: |
          set -x
          export EXPO_DEBUG=1
          node -v
          npm -v
          npx expo --version
          echo "--- package.json ---"
          cat package.json
          echo "--- app.json ---"
          cat app.json
          echo "--- babel.config.js ---"
          cat babel.config.js
          echo "--- trying expo config ---"
          npx expo config --type public
          echo "--- trying expo config json ---"
          npx expo config --json

      - name: Build APK (EAS local)
        script: |
          export EXPO_TOKEN="$EXPO_TOKEN"
          export EAS_LOCAL_BUILD_WORKINGDIR="$CM_BUILD_DIR/eas-local-build"
          eas build \
            --platform android \
            --profile preview \
            --local \
            --output "$CM_BUILD_DIR/plant-genetics-debug.apk" \
            --non-interactive
