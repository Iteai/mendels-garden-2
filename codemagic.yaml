workflows:
  android-build:
    name: Android Build (APK + AAB)
    max_build_duration: 60        # EAS cloud build può richiedere più di 30 min
    instance_type: mac_mini_m1

    environment:
      groups:
        - plantgenetics-credentials
      node: 18
      npm: 9

    scripts:
      # ── 1. Assets prima di tutto ────────────
      - name: Download missing assets
        script: |
          mkdir -p assets
          curl -L -o assets/icon.png          "https://dummyimage.com/1024x1024/1a2e1a/81c784.png"
          curl -L -o assets/splash.png        "https://dummyimage.com/1242x2436/1a2e1a/81c784.png"
          curl -L -o assets/adaptive-icon.png "https://dummyimage.com/1024x1024/1a2e1a/81c784.png"
          curl -L -o assets/favicon.png       "https://dummyimage.com/192x192/1a2e1a/81c784.png"

      # ── 2. Dipendenze ───────────────────────
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps

      # ── 3. Linter (facoltativo, non blocca) ─
      - name: Run linter
        script: |
          npx eslint . --ext .ts,.tsx --max-warnings=0 || true

      # ── 4. EAS CLI ──────────────────────────
      - name: Install EAS CLI
        script: |
          npm install -g eas-cli

      # ── 5. Login su Expo ────────────────────
      - name: Expo login
        script: |
          eas whoami || npx expo login --non-interactive -t $EXPO_TOKEN

      # ── 6. Build APK debug (local) ──────────
      - name: Build Android debug APK
        script: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --local                  # genera il file localmente per gli artifacts

      # ── 7. Build AAB release (local) ────────
      - name: Build Android release AAB
        script: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --local

    artifacts:
      - "**/*.apk"
      - "**/*.aab"

    publishing:
      email:
        recipients:
          - developer@example.com
        notify:
          success: true
          failure: true
