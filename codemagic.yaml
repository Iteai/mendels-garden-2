workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 120

    environment:
      node: 20
      java: 17

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Download missing assets
        script: |
          mkdir -p assets
          curl -L -o assets/icon.png "https://dummyimage.com/1024x1024/1a2e1a/81c784.png"
          curl -L -o assets/splash.png "https://dummyimage.com/1242x2436/1a2e1a/81c784.png"
          curl -L -o assets/adaptive-icon.png "https://dummyimage.com/1024x1024/1a2e1a/81c784.png"
          curl -L -o assets/favicon.png "https://dummyimage.com/192x192/1a2e1a/81c784.png"

      - name: Expo Prebuild
        script: npx expo prebuild --platform android --clean

      - name: Debug Kotlin config
        script: |
          echo "=== build.gradle ==="
          cat android/build.gradle
          echo "=== gradle.properties ==="
          cat android/gradle.properties || true
          echo "=== libs.versions.toml ==="
          cat android/gradle/libs.versions.toml || true
          echo "=== search 1.9.24 ==="
          grep -R "1.9.24" android || true
          echo "=== search 1.9.25 ==="
          grep -R "1.9.25" android || true

      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build Android Release APK
        script: |
          cd android
          ./gradlew assembleRelease --stacktrace

    artifacts:
      - android/app/build/outputs/apk/release/**/*.apk

    publishing:
      email:
        recipients:
          - trabattig7@gmail.com
        notify:
          success: true
          failure: true
