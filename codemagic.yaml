# ─────────────────────────────────────────────
# codemagic.yaml
# Plant Genetics — Android Build Pipeline
#
# HOW TO USE (smartphone-friendly setup):
#
# 1. Push this repo to GitHub (via GitHub web/mobile editor)
# 2. Sign up at codemagic.io and connect your GitHub repo
# 3. In Codemagic → Teams → Global variables, add:
#
#    EXPO_TOKEN         Your Expo account token
#                       Get it at: expo.dev/accounts/[you]/settings/access-tokens
#
#    DEVELOPER_EMAIL    Your email for build notifications
#
#    For RELEASE builds only (optional):
#    ANDROID_KEYSTORE          Base64-encoded .jks keystore file
#    ANDROID_KEYSTORE_PASSWORD Keystore password
#    ANDROID_KEY_ALIAS         Key alias
#    ANDROID_KEY_PASSWORD      Key password
#
# 4. Trigger builds:
#    - Debug:   push to 'develop' or 'main' branch
#    - Release: push a git tag matching 'v*' (e.g. v1.0.0)
#
# WORKFLOWS:
#   android-debug    → APK for direct install / testing
#   android-release  → signed AAB for Play Store
# ─────────────────────────────────────────────

workflows:

  # ─── Debug APK ──────────────────────────────
  # Produces an installable APK. Triggered on every
  # push to develop or main. Fast — no signing needed.

  android-debug:
    name: Android Debug (APK)
    instance_type: linux
    max_build_duration: 60

    environment:
      node: 20.11.0
      groups:
        - expo_credentials      # must contain EXPO_TOKEN
      vars:
        PACKAGE_NAME: com.plantgenetics.app
        EAS_NO_VCS: "1"         # run inside Codemagic without git VCS checks

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
        - pattern: main
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Set Node version
        script: nvm use 20 || true

      - name: Install dependencies
        script: npm ci

      - name: Authenticate with Expo
        script: |
          npx expo login --non-interactive || true
          echo "EXPO_TOKEN: ${EXPO_TOKEN:0:8}..."

      - name: Install EAS CLI
        script: npm install -g eas-cli@latest

      - name: Configure EAS project
        script: |
          # Link to Expo project without interactive prompt
          cat > eas.json << 'EASEOF'
          {
            "cli": { "version": ">= 7.0.0", "appVersionSource": "local" },
            "build": {
              "preview": {
                "distribution": "internal",
                "android": { "buildType": "apk", "gradleCommand": ":app:assembleRelease" }
              },
              "production": {
                "android": { "buildType": "app-bundle" }
              }
            }
          }
          EASEOF

      - name: Build APK (EAS local)
        script: |
          eas build \
            --platform android \
            --profile preview \
            --local \
            --output "$CM_BUILD_DIR/plant-genetics-debug.apk" \
            --non-interactive \
            --no-wait

    artifacts:
      - $CM_BUILD_DIR/plant-genetics-debug.apk
      - $CM_BUILD_DIR/*.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
