workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 120

    environment:
      node: 20
      java: 17

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Download missing assets
        script: |
          mkdir -p assets
          curl -L -o assets/icon.png "https://dummyimage.com/1024x1024/1a2e1a/81c784.png"
          curl -L -o assets/splash.png "https://dummyimage.com/1242x2436/1a2e1a/81c784.png"
          curl -L -o assets/adaptive-icon.png "https://dummyimage.com/1024x1024/1a2e1a/81c784.png"
          curl -L -o assets/favicon.png "https://dummyimage.com/192x192/1a2e1a/81c784.png"

      - name: Expo Prebuild
        script: npx expo prebuild --platform android --clean

      - name: Patch Kotlin version
        script: |
          if [ -f android/build.gradle ]; then
            sed -i.bak "s/ext.kotlinVersion = '1.9.24'/ext.kotlinVersion = '1.9.25'/g" android/build.gradle || true
            sed -i.bak "s/kotlinVersion = '1.9.24'/kotlinVersion = '1.9.25'/g" android/build.gradle || true
          fi
          if [ -f android/gradle/libs.versions.toml ]; then
            sed -i.bak 's/kotlin = "1.9.24"/kotlin = "1.9.25"/g' android/gradle/libs.versions.toml || true
          fi

      - name: Build Android Debug APK
        script: |
          cd android
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/**/*.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
